# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: 'Execução Manual'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
  workflow_dispatch:

#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalção do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do Yarn
      ##
      - name: Instalando Yarn
        run: npm install -g yarn

      #   instalação das dependências
      - name: Instalando dependências
        run: yarn

      # instalação dos Browsers do Playwright
      - name: Instalando Browsers do Playwright
        run: yarn playwright install

      # executar os testes e2e
      - name: Executando testes e2e
        run: yarn run e2e

      # Publicar resultados de testes JUnit (Marketplace)
      - name: Publicar relatório de testes JUnit
        uses: mikepenz/action-junit-report@v4
        if: always() # garante que execute mesmo se os testes falharem
        with:
          report_paths: 'results.xml'

      # Upload do relatório HTML do Playwright (Marketplace)
      - name: Fazer upload do relatório HTML do Playwright
        uses: actions/upload-artifact@v4
        if: always() # garante que o relatório seja enviado mesmo se os testes falharem
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
