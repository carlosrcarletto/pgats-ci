# CI de Nível 01 - Disparo Manual
name: Execução Manual-$(Date:yyyyMMdd).$(Rev:r)

# Gatilhos automáticos desabilitados para execução manual
trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  # Clone do projeto
  - checkout: self
    displayName: 'Checkout do código'

  # Instalação do Node.js
  - task: NodeTool@0
    inputs:
      versionSpec: '24.x'
    displayName: 'Instalando Node.js'

  # Instalação do Yarn
  - script: npm install -g yarn
    displayName: 'Instalando Yarn'

  # Instalação das dependências
  - script: yarn install
    displayName: 'Instalando dependências'

  # Instalação dos Browsers do Playwright
  - script: yarn playwright install
    displayName: 'Instalando Browsers do Playwright'

  # Executar os testes e2e
  - script: yarn run e2e
    displayName: 'Executando testes e2e'
